# POC: three Keycloak realms stacks (each with its own Postgres).
# Usage:
#   1. Run .\initial-setup.ps1 (elevated) to create certs\*.pfx and trust them in LocalMachine\Root.
#   2. docker compose up -d
#
# URLs (after start):
#   User-facing HTTPS (main):
#     onprem_1:  https://localhost:8181  |  management https://localhost:9191
#     onprem_2:  https://localhost:8282  |  management https://localhost:9292
#     cloud_idp: https://localhost:8080  |  management https://localhost:9090
#   HTTP backchannel only (cloud container -> host; plain HTTP on internal Keycloak port 8080):
#     onprem_1: http://host.docker.internal:8182
#     onprem_2: http://host.docker.internal:8283
#
# /health/* lives on the management port (KC_HTTP_MANAGEMENT_PORT), not on the main public HTTPS port; use https://localhost:9191 etc. when TLS is on.
# See https://www.keycloak.org/server/management-interface
#
# Default admin (each instance): admin / admin

services:
  postgres_onprem_1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ONPREM_1:-keycloak_onprem_1}
    volumes:
      - pg_onprem_1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak_onprem_1:
    image: quay.io/keycloak/keycloak:26.0.5
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_onprem_1:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD_ONPREM_1:-keycloak_onprem_1}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: "https://localhost:8181"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/keystore.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: ${KEYCLOAK_KEYSTORE_PASSWORD:-password}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_MANAGEMENT_PORT: "9000"
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
    volumes:
      - ./certs/keycloak-onprem-1.pfx:/opt/keycloak/keystore.pfx:ro
    ports:
      - "8181:8443"
      - "8182:8080"
      - "9191:9000"
    depends_on:
      postgres_onprem_1:
        condition: service_healthy

  postgres_onprem_2:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ONPREM_2:-keycloak_onprem_2}
    volumes:
      - pg_onprem_2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak_onprem_2:
    image: quay.io/keycloak/keycloak:26.0.5
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_onprem_2:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD_ONPREM_2:-keycloak_onprem_2}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: "https://localhost:8282"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/keystore.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: ${KEYCLOAK_KEYSTORE_PASSWORD:-password}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_MANAGEMENT_PORT: "9000"
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
    volumes:
      - ./certs/keycloak-onprem-2.pfx:/opt/keycloak/keystore.pfx:ro
    ports:
      - "8282:8443"
      - "8283:8080"
      - "9292:9000"
    depends_on:
      postgres_onprem_2:
        condition: service_healthy

  postgres_cloud_idp:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_CLOUD_IDP:-keycloak_cloud_idp}
    volumes:
      - pg_cloud_idp:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak_cloud_idp:
    image: quay.io/keycloak/keycloak:26.0.5
    # Organizations admin API / realm toggle require the organization feature on the server.
    command: ["start-dev", "--features", "organization"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres_cloud_idp:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD_CLOUD_IDP:-keycloak_cloud_idp}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: "https://localhost:8080"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HTTPS_PORT: "8443"
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/keystore.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: ${KEYCLOAK_KEYSTORE_PASSWORD:-password}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_MANAGEMENT_PORT: "9000"
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
    volumes:
      - ./certs/keycloak-cloud-idp.pfx:/opt/keycloak/keystore.pfx:ro
    ports:
      - "8080:8443"
      - "9090:9000"
    depends_on:
      postgres_cloud_idp:
        condition: service_healthy

volumes:
  pg_onprem_1:
  pg_onprem_2:
  pg_cloud_idp:
